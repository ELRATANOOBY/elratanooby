/* TITULO */

    margin-top:25px;

    font-size:62px;

    color:white;

    text-shadow:
        0 0 10px #b06cff,
        0 0 35px #6f00ff;

/* SUBTITULO */
.subtitle{
    margin-top:20px;
    margin-bottom:45px;

    color:#eeeeee;

    font-size:22px;
}

/* BOTONES */
.links{
    width:100%;
    max-width:450px;
    margin:auto;
}

.links a{

    display:flex;
    align-items:center;
    justify-content:center;

    margin:18px 0;

    font-size:28px;

    border-radius:22px;

    border:2px solid #b06cff;

    box-shadow:
        0 0 15px #6f00ff,
        inset 0 0 15px #6f00ff;

    transition:0.3s;
}

.links a:hover{
    transform:scale(1.05);

    background:#b06cff;
}

/* FRASE FINAL */
.footer{

    margin-top:60px;

    font-size:20px;

    color:#b06cff;

    text-shadow:0 0 12px #b06cff;

    letter-spacing:3px;
}
/* ELECTRICIDAD */

.electricidad{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

.rayo{
    position:absolute;

    width:300px;
    height:4px;

    background:linear-gradient(
        90deg,
        transparent,
        #b06cff,
        white,
        #b06cff,
        transparent
    );

    box-shadow:
    0 0 15px #b06cff,
    0 0 30px #6f00ff;

    animation:rayoMove 3s linear infinite;

    opacity:0.7;
}

.rayo:nth-child(1){
    top:20%;
    animation-delay:0s;
}

.rayo:nth-child(2){
    top:50%;
    animation-delay:1s;
}

.rayo:nth-child(3){
    top:80%;
    animation-delay:2s;
}

@keyframes rayoMove{

    0%{
        left:-400px;
        transform:rotate(10deg);
    }

    100%{
        left:120%;
        transform:rotate(-10deg);
    }

}
</style>
