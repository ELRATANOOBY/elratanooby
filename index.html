    font-size:62px;

    color:white;

        0 0 10px #b06cff,
        0 0 35px #6f00ff;

/* SUBTITULO */

    margin-top:20px;

}

/* BOTONES */
.links{
    width:100%;

.links a{

    display:flex;

    border:2px solid #b06cff;

    box-shadow:
        0 0 15px #6f00ff,
        inset 0 0 15px #6f00ff;

    transition:0.3s;
}

.links a:hover{
    transform:scale(1.05);

    background:#b06cff;
}

/* FRASE FINAL */
    /* CLAN EVIL */

.clan{

    margin-top:50px;

    font-size:55px;

    font-weight:bold;

    color:#ff0000;

    text-shadow:
    0 0 10px #ff0000,
    0 0 30px #990000,
    0 0 60px #ff0000;

    letter-spacing:6px;

    animation:evilGlow 2s infinite alternate;

}

@keyframes evilGlow{

    0%{
        transform:scale(1);
    }

    100%{
        transform:scale(1.05);
    }

}
/* BOTON CLAN EVIL */

.clan-btn{

    display:inline-block;

    margin-top:25px;

    padding:18px 40px;

    border-radius:18px;

    background:#8b0000;

    color:white;

    font-size:24px;

    font-weight:bold;

    text-decoration:none;

    letter-spacing:3px;

    text-transform:uppercase;

    border:2px solid #ff0000;

    text-shadow:
        0 0 10px #ffffff,
        0 0 20px #ff0000;

    box-shadow:
        0 0 20px #ff0000,
        0 0 40px #990000;

    animation:latido 1.2s infinite;

}

/* LATIDO */

@keyframes latido{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);

        box-shadow:
        0 0 25px #ffffff,
        0 0 60px #ff0000;
    }

    100%{
        transform:scale(1);
    }

}
    
.footer{

    margin-top:60px;

    font-size:20px;

    color:#b06cff;

    text-shadow:0 0 12px #b06cff;

    letter-spacing:3px;
}
/* ELECTRICIDAD */

/* ENERGIA ELECTRICA */

.electricidad{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:20;
}

/* RAYOS */

.rayo{

    position:absolute;

    width:180px;
    height:4px;

    background:
    linear-gradient(
        90deg,
        transparent,
        #ffffff,
        #b06cff,
        #6f00ff,
        transparent
    );

    border-radius:20px;

    box-shadow:
        0 0 15px #ffffff,
        0 0 30px #b06cff,
        0 0 60px #6f00ff;

    clip-path:polygon(
        0% 50%,
        10% 20%,
        20% 80%,
        30% 30%,
        40% 70%,
        50% 20%,
        60% 80%,
        70% 30%,
        80% 70%,
        90% 20%,
        100% 50%
    );

    opacity:0;

    animation:energia 2s linear infinite;
}

/* POSICIONES */

.rayo:nth-child(1){
    top:15%;
    animation-delay:0s;
}

.rayo:nth-child(2){
    top:35%;
    animation-delay:0.7s;
}

.rayo:nth-child(3){
    top:55%;
    animation-delay:1.4s;
}

.rayo:nth-child(4){
    top:75%;
    animation-delay:2.1s;
}

/* MOVIMIENTO */

@keyframes energia{

    0%{
        left:-250px;
        opacity:0;
        transform:rotate(15deg) scale(0.7);
    }

    15%{
        opacity:1;
    }

    50%{
        opacity:0.9;
    }

    100%{
        left:120%;
        opacity:0;
        transform:rotate(-15deg) scale(1.2);
    }

}
